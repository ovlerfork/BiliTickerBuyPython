name: Patch Release

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for creating a patch release"
        required: false
        default: manual
  repository_dispatch:
    types:
      - upstream-version-bump
  push:
    branches:
      - dev
    paths:
      - "patches/cur/*.patch"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish Latest And Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout control branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select control branch
        run: git switch dev

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish latest branch
        id: publish
        env:
          CONTROL_REF: dev
          MAIN_REF: main
          LATEST_REF: latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/publish-latest.sh

      - name: Normalize release tag
        id: release
        env:
          TAG: ${{ steps.publish.outputs.tag || steps.publish.outputs.release_tag || steps.publish.outputs.patch_tag }}
        run: |
          if [ -n "$TAG" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout generated latest
        if: steps.release.outputs.publish == 'true'
        uses: actions/checkout@v4
        with:
          ref: latest
          path: latest
          fetch-depth: 0

      - name: Set up QEMU
        if: steps.release.outputs.publish == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.release.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.release.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.release.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: latest
          file: latest/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.publish.outputs.docker_tag_exact }}
            ${{ steps.publish.outputs.docker_tag_rolling }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
